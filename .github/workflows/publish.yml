name: Publish to PyPI

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v1.1.0, etc.
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  build-and-publish:
    name: Build and publish Python distribution to PyPI
    runs-on: ubuntu-latest
    
    # [fact]: These permissions are strictly required for OIDC Trusted Publishing
    permissions:
      id-token: write 
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # Matches your pyproject.toml minimum version

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build standard distribution
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1